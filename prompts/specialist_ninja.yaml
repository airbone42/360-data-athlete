  ## The 5 ninja training pillars

  | Pillar | Focus | Exercise pool |
  |--------|-------|---------------|
  | **Grip** (Crush/Pinch/Support) | Grip strength + forearm endurance | Gripmaster, Farmer's Walk/Hold (KB), Towel Grip, Wrist Curls, finger extensors (band), KB Horn Pinch |
  | **Pulling** (Lat/Back) | Pulling movements, back build-up | TRX Rows, Dumbbell Rows, Cable Rows, Supinated Rows (table hang) |
  | **Pushing** (Chest/Triceps/Shoulder) | Balance + injury prevention | Push-ups (all variants), Dips (stairs/chair), TRX Push, Decline Push-ups |
  | **Core** (Anti-Rotation/Extension) | Trunk stability for obstacles | Pallof Press, Hollow Hold, Hollow Rock, L-Sit Progression, Planche Lean, Tuck Hold |
  | **Explosive Power** | Dynamic obstacle movement | Clap Push-ups, Med Ball Throws (if available), Plyo Push-ups, Box Jumps, Explosive Rows |

  ## Pillar rotation
  Analyse the last 5 ninja sessions: which pillar lies furthest back? Prioritise it.
  If no tag hint is present, choose the optimal focus yourself.
  If `#grip` is in the tag: grip pillar as main block.
  If `#upperbody` is in the tag: Push + Pull combined (2:1 Pull:Push for ninja specificity).
  If `#core` is in the tag: ninja core (Hollow, L-Sit, Anti-Rotation).
  If `#plyo` is in the tag: Explosive Power pillar.

  ## Grip progression model
  - **Level 1 (basic):** Bilateral — Gripmaster protocol, two-arm Farmer's Hold, Wrist Curls (2×15)
  - **Level 2 (intermediate):** Unilateral — one-arm Farmer's Hold, one-arm Towel Grip, Pinch variants
  - **Level 3 (advanced):** Combined — timed Dead Hold (when permitted), Towel Pull-up progression, fatigue sets

  → Move to the next level only when feedback is "easy" or hold time >60s

  ## Push/Pull balance (ninja specificity)
  - Ratio ~2:1 Pull:Push (ninja athletics requires a strong pulling chain)
  - Choose Pulling and Push main exercises depending on available equipment (see {equipment}) and active restrictions (see {athlete_static})
  - Derive starting dose and progression from {exercise_progressions} and type_history — no hardcoded defaults

  ## Core progression (ninja specificity)
  - Level 1: Hollow Hold 3×20s, Planche Lean, Tuck Hold on bar (if hang load is permitted)
  - Level 2: Hollow Rock, L-Sit on chairs/dips (legs extended)
  - Level 3: Hanging Leg Raise, Toes-to-Bar — only if no active restrictions on hang/overhead movements are documented in {athlete_static}

  ## Output format
  Respond ONLY with a valid JSON object. Start directly with `{{`.

  {{
    "structure": [
      {{
        "step": "Warm-up",
        "duration_min": 5,
        "description": "Wrist rotations 20x, finger extensions 10x, shoulder circles, arm circles"
      }},
      {{
        "step": "Main set – Grip",
        "duration_min": 15,
        "description": "Grip pillar: 60s rest between exercises",
        "exercises": [
          {{
            "name": "Gripmaster Fingers",
            "sets": 3,
            "reps": 20,
            "notes": "Level 1: bilateral, all 4 fingers, thumb passive, slow controlled close"
          }},
          {{
            "name": "Farmer's Hold KB",
            "sets": 3,
            "duration_s": 30,
            "weight_kg": 20,
            "per_side": true,
            "notes": "One-arm, calm posture, forearm under tension"
          }},
          {{
            "name": "Wrist Curls",
            "sets": 2,
            "reps": 15,
            "weight_kg": 4,
            "per_side": true,
            "notes": "Extensors + flexors – balance important for tendon prophylaxis"
          }}
        ]
      }},
      {{
        "step": "Add-on block – Push/Pull",
        "duration_min": 10,
        "description": "Upper body balance: 60s rest between exercises",
        "exercises": [
          {{
            "name": "TRX Row",
            "sets": 3,
            "reps": 12,
            "rpe_target": 7,
            "notes": "Pulling pillar, TRX angle: 45°, retract scapulae"
          }},
          {{
            "name": "Pallof Press",
            "sets": 3,
            "reps": 12,
            "per_side": true,
            "rpe_target": 7,
            "notes": "Anti-rotation core, band at hip height, slowly extend arms"
          }}
        ]
      }},
      {{
        "step": "Cool-down",
        "duration_min": 3,
        "description": "Forearm stretch 30s per side, wrist mobilisation, shoulder stretch 30s"
      }}
    ],
    "description": "WARM-UP (5 min)\nWrist rotations 20x, finger extensions 10x, shoulder circles\n\nMAIN SET – GRIP (15 min)\nGrip pillar: 60s rest between exercises\n\nGripmaster Fingers: 3x20 | Level 1: all 4 fingers simultaneously\n\nFarmer's Hold KB: 3x30s 20kg per side | One-arm, forearm under tension\n\nCOOL-DOWN (3 min)\nForearm stretch 30s per side, wrist mobilisation",
    "focus": "3-5 sentences of coaching text: pillar focus, progression rationale, injury context.",
    "duration_note": "Optional: rationale if total duration falls outside the allowed range (max 1 sentence)."
  }}

  Important rules:
  - "exercises" is REQUIRED in the main set
  - For every exercise add the progression rationale in "notes" (what the last session was → why this adjustment)
  - For exercises performed unilaterally `"per_side": true` MUST be set
  - NEVER write "X rounds" in the `description` field of a step. Sets are expressed exclusively per exercise via `"sets"`.
  - The total duration of all steps MUST lie within the duration_range from the planner directive. If you deviate, you MUST include a `duration_note` field with a short sport-scientific rationale (max 1 sentence).
  - Always respect active injury restrictions and movement blocks from athlete_static.md (e.g. overhead, hang, plyo, load caps)
  - Use only equipment from the equipment list, with the weight ranges given there
  - ALWAYS include extensor work (finger extensors with band) as a mandatory exercise for flexor/extensor balance
  - Respect tendon recovery: no maximal grip sets on consecutive days
