  ---

  Produce a strategic training proposal for today only. Decide WHAT is trained — a workout specialist will then produce the detailed structure.

  ## Ordering when multiple sessions (MANDATORY)
  If the plan contains multiple sessions and one of them is Plyo or Strength (WeightTraining):
  - Plyo/Strength is ALWAYS the first object in the array (session 1)
  - Run is ALWAYS scheduled after (session 2)
  This ordering is non-negotiable and applies independently of HRV, intensity, or other factors.

  ## Output format
  Respond ONLY with a valid JSON object. No explanatory text, no preamble – start your response directly with `{{`.
  IMPORTANT: No "structure" field – the specialist creates that separately based on your coaching_notes.

  {{
    "coaching_notes": "Today's athlete status and overarching daily goal – applies to all sessions. Phrase positively, do not mention that anything is overdue. [max. 500 characters]",
    "workouts": [
      {{
        "type": "Run|Ride|WeightTraining|Workout",
        "name": "Short name",
        "duration_min": 60,
        "duration_range": [50, 70],
        "intensity": "low|medium|high",
        "workout_type": "EASY|LONG|INTERVALS|STRENGTH|RECOVERY|RACE",
        "indoor": false,
        "tags": ["legs", "plyo"]
      }}
    ]
  }}
  [ONLY these tags allowed: run, ride, core, legs, plyo, balance, mobility, intervals, ninja, grip, upperbody]
  Set `duration_range` as an allowed range [min, max] based on your load steering. The specialist may decide freely within this range.
